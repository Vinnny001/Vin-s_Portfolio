<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Random Number Generator</title>

  <style>
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: #ffffff;
      padding: 30px 40px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      text-align: center;
      width: 320px;
    }

    h2 {
      margin-bottom: 20px;
      color: #333;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: 500;
      color: #555;
      text-align: left;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
      outline: none;
      transition: border 0.3s;
    }

    input:focus {
      border-color: #4facfe;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #4facfe;
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
    }

    button:hover {
      background: #3a8de0;
      transform: translateY(-2px);
    }

    #result {
      margin-top: 20px;
      font-size: 24px;
      font-weight: bold;
      color: #222;
      background: #f4f6f8;
      padding: 10px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>🎲 Random Number Generator</h2>

    <label>Min:</label>
    <input type="number" id="min" value="1">

    <label>Max:</label>
    <input type="number" id="max" value="100">

    <button onclick="generate()">Generate</button>

    <h3 id="result">-</h3>
  </div>

  <script src="random_number.js"></script>

  <script>
    function generate() {
      let min = parseInt(document.getElementById("min").value);
      let max = parseInt(document.getElementById("max").value);

      let num = getRandom(min, max);
      document.getElementById("result").innerText = num;
    }
  </script>

</body>
</html>
